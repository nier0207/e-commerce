<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CodeBooks · Order History</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="main-content">
            <!-- HEADER WITH BACK BUTTON -->
            <div class="section-header">
                <a href="settings.html" style="color: #7e3af2; text-decoration: none; font-size: 0.9rem;">
                    <i class="fas fa-arrow-left"></i> Back to Settings
                </a>
                <h4 style="margin: 0;">📦 Order History</h4>
                <div style="width: 70px;"></div>
            </div>

            <!-- ORDERS LIST -->
            <div id="orderHistoryFullPage" class="cart-item-list" style="margin-top: 1rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <span class="cart-badge"><i class="fas fa-history"></i> Your Orders</span>
                    <button class="clear-cart" id="refreshOrdersBtn" style="font-size: 0.8rem;"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>
                <div id="ordersListContainer">
                    <!-- Orders will appear here -->
                    <div class="empty-cart">Loading...</div>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAVIGATION -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="shop.html" class="nav-item"><i class="fas fa-book-open"></i><span>Products</span></a>
            <a href="cart.html" class="nav-item"><i class="fas fa-shopping-cart"></i><span>Cart</span></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-sliders-h"></i><span>Setting</span></a>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="globalToast" class="notif-toast"></div>

    <!-- JavaScript Files -->
    <script src="utils.js"></script>
    <script src="main.js"></script>
    <script src="cart.js"></script>
    <script src="checkout.js"></script>
    <script src="settings.js"></script>

    <script>
        // Render full page order history
        function renderFullOrderHistory() {
            const container = document.getElementById('ordersListContainer');
            if (!container) return;
            
            loadOrders();
            
            if (orders.length === 0) {
                container.innerHTML = '<div class="empty-cart">📭 No orders yet. <a href="shop.html" style="color:#7e3af2;">Start shopping!</a></div>';
                return;
            }
            
            let html = '';
            orders.forEach(order => {
                const statusClass = order.status === 'Pending' ? 'status-pending' : 'status-completed';
                html += `
                    <div class="order-item" style="margin-bottom: 1rem;">
                        <div class="order-item-header">
                            <span class="order-date"><i class="far fa-calendar-alt"></i> ${order.date}</span>
                            <span class="order-status ${statusClass}">${order.status}</span>
                        </div>
                        <div class="order-details">
                            <div><i class="fas fa-user"></i> <strong>${escapeHtml(order.fullName)}</strong></div>
                            <div><i class="fas fa-map-marker-alt"></i> ${escapeHtml(order.address)}</div>
                            <div><i class="fas fa-credit-card"></i> Payment: ${order.paymentMethod}</div>
                            <div style="margin-top: 0.6rem; padding-top: 0.4rem; border-top: 1px dashed #cebef0;">
                                <strong>Items:</strong>
                                <div style="margin-top: 0.3rem;">
                                    ${order.items.map(item => `📘 ${item.title} x${item.quantity || 1} - ${formatCurrency(item.price)}`).join('<br>')}
                                </div>
                            </div>
                            <div style="margin-top: 0.6rem; font-weight:800; font-size:1.1rem;">Total: ${formatCurrency(order.total)}</div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            renderFullOrderHistory();
            
            const refreshBtn = document.getElementById('refreshOrdersBtn');
            if (refreshBtn) {
                refreshBtn.addEventListener('click', renderFullOrderHistory);
            }
        });
    </script>
</body>
</html>
