<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CodeBooks · Home</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="main-content">
            <!-- 40% OFF BANNER -->
            <div class="promo-banner">
                <div>
                    <h3>40% off</h3>
                    <p>Programming e-books</p>
                </div>
                <a href="shop.html" class="see-all-link">See All →</a>
            </div>

            <!-- TOP CATEGORY -->
            <h4 style="margin-bottom: 0.8rem; color:#2d0a4e;">Top Category</h4>
            <div class="category-chips">
                <span class="chip active" data-category="all">All</span>
                <span class="chip" data-category="python">Python</span>
                <span class="chip" data-category="javascript">JavaScript</span>
                <span class="chip" data-category="java">Java</span>
            </div>

            <!-- FEATURED COURSE -->
            <div class="featured-card">
                <div class="featured-content">
                    <div class="featured-icon"><i class="fab fa-python"></i></div>
                    <div class="featured-info">
                        <h3>Python Masterclass</h3>
                        <div class="featured-meta">
                            <span><i class="far fa-file-alt"></i> 42 Lesson</span>
                            <span><i class="fas fa-user-check"></i> 3.2k enrolled</span>
                        </div>
                        <div class="featured-price">₱45.00</div>
                    </div>
                </div>
            </div>

            <!-- POPULAR E-BOOKS SECTION -->
            <div class="section-header">
                <h4>Popular programming e-books</h4>
                <a href="shop.html" class="see-all">See all</a>
            </div>

            <div class="course-grid" id="homeProductsGrid"></div>

            <!-- CART PREVIEW -->
            <div class="cart-item-list" id="cartPreview"></div>
        </div>

        <!-- BOTTOM NAVIGATION -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="shop.html" class="nav-item"><i class="fas fa-book-open"></i><span>Products</span></a>
            <a href="cart.html" class="nav-item"><i class="fas fa-shopping-cart"></i><span>Cart</span></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-sliders-h"></i><span>Setting</span></a>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="globalToast" class="notif-toast"></div>

    <!-- JavaScript Files -->
    <script src="utils.js"></script>
    <script src="main.js"></script>
    <script src="cart.js"></script>
    <script src="checkout.js"></script>
    <script src="settings.js"></script>

    <script>
        // Category filter for home page
        let currentCategory = 'all';

        function renderHomeProducts() {
            const container = document.getElementById('homeProductsGrid');
            if (!container) return;
            
            let filteredBooks = booksData;
            if (currentCategory !== 'all') {
                filteredBooks = booksData.filter(b => b.category === currentCategory);
            }
            
            const booksToShow = filteredBooks.slice(0, 6);
            
            container.innerHTML = booksToShow.map(book => `
                <div class="ebook-card">
                    <div class="card-icon"><i class="${book.icon}"></i></div>
                    <div class="ebook-title">${book.title}</div>
                    <div class="ebook-meta">
                        <span><i class="far fa-file-alt"></i> ${book.lesson} Lesson</span>
                    </div>
                    <div class="price-row">
                        <span class="price">${formatCurrency(book.price)}</span>
                        <button class="add-btn" onclick="addToCart({id:'${book.id}', title:'${book.title}', price:${book.price}, category:'${book.category}', lesson:${book.lesson}, icon:'${book.icon}'})"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // Setup category filters
        function setupHomeFilters() {
            const chips = document.querySelectorAll('.chip');
            chips.forEach(chip => {
                chip.addEventListener('click', function() {
                    chips.forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.getAttribute('data-category');
                    renderHomeProducts();
                });
            });
        }

        // Update cart preview function (override from cart.js)
        function updateCartPreview() {
            const previewContainer = document.getElementById('cartPreview');
            if (!previewContainer) return;
            
            const itemCount = getCartItemCount();
            const total = getCartTotal();
            
            if (itemCount === 0) {
                previewContainer.innerHTML = '<div class="empty-cart">🛒 Your cart is empty</div>';
                return;
            }
            
            let itemsHtml = '';
            cartItems.slice(0, 3).forEach(item => {
                itemsHtml += `
                    <div class="cart-item">
                        <div>
                            <div class="cart-item-title">${item.title}</div>
                            <div class="cart-item-price">${formatCurrency(item.price)}</div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 4px;">
                            <span style="font-size:0.8rem;">x${item.quantity || 1}</span>
                        </div>
                    </div>
                `;
            });
            
            if (cartItems.length > 3) {
                itemsHtml += `<div style="text-align:center; padding:0.5rem; color:#7a5fa5;">+${cartItems.length - 3} more items</div>`;
            }
            
            previewContainer.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="cart-badge"><i class="fas fa-shopping-cart"></i> Cart (${itemCount})</span>
                    <a href="cart.html" style="font-size:0.8rem; color:#7e3af2;">View Cart →</a>
                </div>
                ${itemsHtml}
                <div class="cart-total">Total: ${formatCurrency(total)}</div>
                <a href="cart.html" class="checkout-btn" style="display:block; text-align:center; margin-top:0.8rem; text-decoration:none;">
                    <i class="fas fa-credit-card"></i> Checkout
                </a>
            `;
        }

        // Initialize home page
        document.addEventListener('DOMContentLoaded', function() {
            loadCart();
            renderHomeProducts();
            setupHomeFilters();
            updateCartPreview();
        });
    </script>
</body>
</html>
